name: Build

on:
  pull_request:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  PLUGIN_ID: cpa-window-primer

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: .so
          - runner: windows-latest
            goos: windows
            goarch: amd64
            ext: .dll

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: mingw-w64-ucrt-x86_64-gcc

      - name: Resolve release metadata
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "LIB_NAME=${PLUGIN_ID}${{ matrix.ext }}" >> "${GITHUB_ENV}"
          echo "ARCHIVE_NAME=${PLUGIN_ID}_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.zip" >> "${GITHUB_ENV}"

      - name: Configure Windows C compiler
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "C:\msys64\ucrt64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          "CC=C:\msys64\ucrt64\bin\gcc.exe" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build plugin
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          go build -trimpath -buildmode=c-shared -ldflags "-s -w" -o "dist/$env:LIB_NAME" .
          Compress-Archive -Path "dist/$env:LIB_NAME" -DestinationPath $env:ARCHIVE_NAME -Force
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $env:ARCHIVE_NAME).Hash.ToLowerInvariant()
          "$hash  $env:ARCHIVE_NAME" | Out-File -FilePath "$env:ARCHIVE_NAME.sha256" -Encoding ascii -NoNewline

      - uses: actions/upload-artifact@v4
        with:
          name: cpa-window-primer-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            cpa-window-primer_*.zip
            cpa-window-primer_*.zip.sha256
          if-no-files-found: error

  publish:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Checksums
        run: sort *.zip.sha256 > checksums.txt
        working-directory: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" artifacts/*.zip artifacts/checksums.txt --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${GITHUB_REF_NAME}" artifacts/*.zip artifacts/checksums.txt \
              --repo "${GITHUB_REPOSITORY}" \
              --verify-tag \
              --title "${GITHUB_REF_NAME}" \
              --notes "Automated release for ${GITHUB_REF_NAME}."
          fi
