name: Release assets

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
      - "V*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.2.18"
        required: true

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}

jobs:
  ensure-release:
    name: Ensure GitHub Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release-tag.outputs.tag }}
    steps:
      - name: Checkout release history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release-tag
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$RELEASE_TAG" ]; then
            echo "Release tag is empty" >&2
            exit 1
          fi
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Create release when missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.release-tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/generate-release-notes.mjs "$TAG" "$REPO" > release-notes.md

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release already exists: $TAG"
            gh release edit "$TAG" --repo "$REPO" --notes-file release-notes.md
          else
            gh release create "$TAG" --repo "$REPO" --title "$TAG" --notes-file release-notes.md --target "$GITHUB_SHA"
          fi

  plugin-asset:
    name: Build plugin (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: ensure-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            runner: windows-latest
            ext: dll
          - platform: linux-x64
            runner: ubuntu-latest
            ext: so
          - platform: macos-x64
            runner: macos-15-intel
            ext: dylib
          - platform: macos-arm64
            runner: macos-14
            ext: dylib
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.ensure-release.outputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Windows C toolchain
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-gcc

      - name: Add Windows C toolchain to PATH
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "C:\msys64\ucrt64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Test
        run: go test ./...

      - name: Build plugin asset
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.ensure-release.outputs.tag }}"
          VERSION="${VERSION#v}"
          VERSION="${VERSION#V}"
          mkdir -p dist
          go build -buildmode=c-shared -o "dist/cpa-window-primer-${VERSION}-${{ matrix.platform }}.${{ matrix.ext }}" .

      - name: Upload plugin asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.ensure-release.outputs.tag }}
        shell: bash
        run: gh release upload "$TAG" dist/* --clobber --repo "$REPO"

  latest-json:
    name: Upload static latest.json
    runs-on: ubuntu-latest
    needs:
      - ensure-release
      - plugin-asset
    steps:
      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.ensure-release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$TAG" --repo "$REPO" --json assets,body,tagName,url > release.json
          node <<'NODE'
          const fs = require("fs");
          const release = JSON.parse(fs.readFileSync("release.json", "utf8"));
          const repo = process.env.REPO;
          const tag = release.tagName || process.env.TAG;
          const version = tag.replace(/^v/i, "");
          const baseUrl = `https://github.com/${repo}/releases/download/${tag}`;
          const assets = (release.assets || [])
            .map((asset) => asset.name)
            .filter((name) => name !== "latest.json")
            .map((name) => ({ name, url: `${baseUrl}/${encodeURIComponent(name)}` }));
          const payload = {
            version: `v${version}`,
            url: release.url || `https://github.com/${repo}/releases/tag/${tag}`,
            body: release.body || "",
            assets
          };
          fs.writeFileSync("latest.json", `${JSON.stringify(payload, null, 2)}\n`);
          NODE
          cat latest.json

      - name: Upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.ensure-release.outputs.tag }}
          REPO: ${{ github.repository }}
        shell: bash
        run: gh release upload "$TAG" latest.json --clobber --repo "$REPO"
